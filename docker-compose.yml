services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: slpra
      POSTGRES_USER: slpra
      POSTGRES_PASSWORD: slpra_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://slpra:slpra_dev@db:5432/slpra
      ONTOLOGY_DIR: /app/ontology/slpra
      OWL_STORE_PATH: /app/data/slpra.sqlite3
    volumes:
      - ./backend/app:/app/app
      - ./ontology:/app/ontology
      - backend_data:/app/data
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
  backend_data:
