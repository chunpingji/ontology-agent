services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: slpra
      POSTGRES_USER: slpra
      POSTGRES_PASSWORD: slpra_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://slpra:slpra_dev@db:5432/slpra
      ONTOLOGY_DIR: /app/ontology/slpra
      OWL_STORE_PATH: /app/data/slpra.sqlite3
      # LLM extraction key — injected from host env / .env, never baked into the image.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # air-gap：强制 huggingface_hub / transformers 全程离线，杜绝任何远程 repo
      # 解析或权重外发（配套代码内 local_files_only=True，008 Principle VI）。
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
    volumes:
      - ./backend/app:/app/app
      - ./ontology:/app/ontology
      # 本地模型权重（GLiNER + 中文嵌入器）不入镜像，经制品库交付到宿主
      # backend/models/，运行期挂载到 /app/models（gliner_model_path /
      # semantic_embedding_model 相对后端根解析至此）。缺权重则静默降级。
      - ./backend/models:/app/models
      - backend_data:/app/data
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # No NEXT_PUBLIC_API_URL: the bundle uses same-origin relative "/api/..."
      # calls; the nginx edge proxy (web) routes them to the backend.
    # Not published to the host — reachable only through the nginx proxy.
    expose:
      - "3000"
    depends_on:
      - backend

  web:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
  backend_data:
