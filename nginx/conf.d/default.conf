# Single edge reverse proxy for the SLPRA stack.
#   /api/*  -> backend  (FastAPI, incl. SSE progress stream)
#   /*      -> frontend (Next.js standalone)
# Browser talks only to this origin, so the app is same-origin and needs no CORS.

upstream slpra_backend {
    server backend:8000;
}

upstream slpra_frontend {
    server frontend:3000;
}

server {
    listen 80;
    server_name _;

    # Allow large document uploads for the extraction pipeline.
    client_max_body_size 50m;

    # ---- Backend API ----
    location /api/ {
        proxy_pass http://slpra_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Server-Sent Events (job progress): never buffer, keep the stream open.
        proxy_set_header Connection "";
        proxy_buffering   off;
        proxy_cache       off;
        proxy_read_timeout 3600s;
    }

    # FastAPI interactive docs (served from root on the backend).
    location ~ ^/(docs|redoc|openapi\.json) {
        proxy_pass http://slpra_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Frontend (everything else) ----
    location / {
        proxy_pass http://slpra_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
